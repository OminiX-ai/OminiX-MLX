name: Release ominix-api

on:
  push:
    tags:
      - "ominix-api-v*"

jobs:
  build:
    runs-on: blaze/macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - run: sudo xcodes select 16.4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-ominix-api

      - name: Build release binary
        run: cargo build --release -p ominix-api --features tts

      - name: Package binary
        run: |
          VERSION=${GITHUB_REF_NAME#ominix-api-}
          mkdir -p dist
          cp target/release/ominix-api dist/
          cd dist
          tar czf ominix-api-${VERSION}-darwin-aarch64.tar.gz ominix-api
          shasum -a 256 ominix-api-${VERSION}-darwin-aarch64.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ominix-api-*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
